name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 tasks/ taskmanager/ --max-line-length=120

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      DJANGO_SECRET_KEY: "ci-testing-secret-key-not-for-production"

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install django djangorestframework dynaconf

      - name: Run unit tests
        env:
          DJANGO_SETTINGS_MODULE: taskmanager.settings
        run: python manage.py test tasks.tests.TaskModelUnitTest -v 2

      - name: Run integration tests
        env:
          DJANGO_SETTINGS_MODULE: taskmanager.settings
        run: |
          python manage.py test \
            tasks.tests.TaskAPIIntegrationTest \
            tasks.tests.TaskPermissionTest \
            tasks.tests.SerializerMethodFieldTest \
            tasks.tests.PaginationTest \
            tasks.tests.DashboardMockTest \
            tasks.tests.ParameterizedTaskCreationTest \
            -v 2
